name: Idea or Suggestion
description: Have an idea to make the Family Calendar better?
title: "[Idea] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your ideas! 🌟 We love hearing how we can make things better.
  
  - type: textarea
    id: idea
    attributes:
      label: What's your idea?
      description: Tell us what you'd like to see improved or added
      placeholder: "I wish the calendar could..."
    validations:
      required: true
  
  - type: textarea
    id: why
    attributes:
      label: Why would this be helpful?
      description: How would this make your family's life easier?
      placeholder: "This would help because..."
    validations:
      required: true
  
  - type: dropdown
    id: type
    attributes:
      label: What type of improvement?
      description: What kind of change is this?
      options:
        - "New feature"
        - "Make something easier to use"
        - "Fix something that's confusing"
        - "Make it work better"
        - "Other"
    validations:
      required: true
  
  - type: textarea
    id: example
    attributes:
      label: Can you give an example?
      description: Show us how you'd use this feature
      placeholder: "For example, when I say '...' the AI could..."
    validations:
      required: false
