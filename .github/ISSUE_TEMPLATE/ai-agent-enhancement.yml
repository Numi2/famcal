name: AI Agent Enhancement
description: Suggest improvements or report issues with the AI calendar assistant
title: "[AI Agent] "
labels: ["ai-agent", "enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to help improve our AI calendar assistant! 🗓️🤖
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the enhancement or issue you'd like to see
      placeholder: "I'd like the AI agent to..."
    validations:
      required: true
  
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: What type of enhancement is this?
      options:
        - "New Feature"
        - "Bug Fix"
        - "Performance Improvement"
        - "User Experience"
        - "Integration"
        - "Other"
    validations:
      required: true
  
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this enhancement?
      options:
        - "Low"
        - "Medium"
        - "High"
        - "Critical"
    validations:
      required: true
  
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a specific scenario where this would be useful
      placeholder: "When a user says 'Schedule a meeting with John tomorrow at 3pm'..."
    validations:
      required: false
  
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What would success look like for this enhancement?
      placeholder: "- User can say 'X' and the agent responds with 'Y'"
    validations:
      required: false 