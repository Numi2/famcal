name: Bug Report
description: Something isn't working right? Let us know!
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve the Family Calendar! 🐛
  
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what went wrong in simple terms
      placeholder: "When I tried to... this happened instead..."
    validations:
      required: true
  
  - type: textarea
    id: what-expected
    attributes:
      label: What should have happened?
      description: What did you expect to happen?
      placeholder: "I expected it to..."
    validations:
      required: true
  
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      description: Which part of the app had the problem?
      options:
        - "Talking to the AI assistant"
        - "Viewing the calendar"
        - "Creating events"
        - "Signing in"
        - "Something else"
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: How can we recreate this?
      description: Tell us step by step what you did
      placeholder: "1. I clicked on... 2. Then I..."
    validations:
      required: false
  
  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Any other details that might help us fix this
    validations:
      required: false
